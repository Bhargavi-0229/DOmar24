services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are baked in at build time — not overridable at runtime.
        # This must match what browsers will use to reach the backend.
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
